<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en">
<head>
	<meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
	<title>ui_buttons</title>
	<style>
	 @font-face {
      font-family: 'different';
      src:url('fonts/different.eot');
      src:url('fonts/different.eot?#iefix') format('embedded-opentype'),
        url('fonts/different.woff') format('woff'),
        url('fonts/different.ttf') format('truetype'),
        url('fonts/different.svg#different') format('svg');
      font-weight: normal;
      font-style: normal;
    }
		.wrap{width:620px;margin:0 auto;background:#6f7787;}
		.demo_container{display:table-cell;vertical-align:middle;width:620px;height:350px;}
		.demo{width:180px;height:50px;margin:0 auto;}
		.demo a{display:inline-block;width:44px;height:37px;line-height:37px;text-align:center;margin-right:10px;background:#636c7e;border-radius:5px;background-image:-webkit-linear-gradient(top,#757e92,#666f80);border:1px solid #676f81;box-shadow:0 2px 4px 0 rgba(80,90,111,.9),inset 0 1px 0 0 #8692a9;color:#f0f0f0;text-shadow:0 1px 0  rgba(94,105,127,.35);font-family:'different';text-decoration:none;}
		.demo a:nth-child(1),.demo a:hover{background:#6f7787;border:1px solid #4a546a;box-shadow:0 1px 0 0 rgba(255,255,255,.25),inset 0 0 6px 0 #333c4d;}
		.demo a:nth-child(3){margin-right:0;}
		
		
	</style>
</head>
<body>
	<div class="wrap">
		<div class="demo_container">
			<div class="demo">
				<a href="#"><span>c</span></a>
				<a href="#"><span>a</span></a>
				<a href="#"><span>b</span></a>
			</div>
		</div>
</body>
	</div>
	
</html>
