<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en">
<head>
	<meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
	<title>share_button</title>
	<style>
	@font-face {
      font-family: 'different';
      src:url('fonts/different.eot');
      src:url('fonts/different.eot?#iefix') format('embedded-opentype'),
        url('fonts/different.woff') format('woff'),
        url('fonts/different.ttf') format('truetype'),
        url('fonts/different.svg#different') format('svg');
      font-weight: normal;
      font-style: normal;
    }
		.wrap{width:680px;margin:0 auto;background:#f1f1f1;}
		.demo_container{display:table-cell;vertical-align:middle;width:680px;height:240px;}
		.demo{width:530px;height:70px;margin:0 auto;}
		.demo a{display:inline-block;width:244px;height:56px;line-height:56px;border-radius:8px;margin-right:20px;text-decoration:none;text-align:center;}
		.demo a span{display:table-cell;vertical-align:middle;width:244px;height:56px;}
		.demo a i{float:left;padding-left:20px;text-shadow:1px 1px 0 #335cb2;color:#fff;font:18px 'Myriad Pro';}
		.demo a em{float:left;width:45px;line-height:37px;text-align:center;font-family:'different';color:#fff;font-size:24px;font-style:normal;}
		.demo a:nth-child(1){background-color:#ff983a;background-image:-webkit-linear-gradient(top,#5681cf,#2e56ae);border:1px solid #3259a6;box-shadow:inset -1px -1px 2px 0 #2549a4,inset 0 1px 3px 0 rgba(255,255,255,.5),1px 3px 2px 0 rgba(32,29,30,.25);}
		.demo a:nth-child(2){background-image:-webkit-linear-gradient(top,#5cc3f3,#3fade0);border:1px solid #329fd6;box-shadow:inset -1px -1px 2px 0 #1e88cf,inset 0 1px 3px 0 rgba(255,255,255,.5),1px 3px 2px 0 rgba(32,29,30,.25);margin-right:0;}
		.demo a:nth-child(1) i{line-height:37px;border-left:1px solid #527dcc;}
		.demo a:nth-child(1) em{border-right:1px solid #2e54a6;}
		.demo a:nth-child(2) i{line-height:37px;border-left:1px solid #5cc3f3;}
		.demo a:nth-child(2) em{border-right:1px solid #37a1d1;}
	</style>
</head>
<body>
	<div class="wrap">
		<div class="demo_container">
			<div class="demo">
				<a href="#" class="facebook_share_btn">
					<span><em>f</em><i>Share on Facebook</i></span>
				</a>
				<a href="#" class="facebook_share_btn">
					<span><em>t</em><i>Share on Twitter</i></span>
				</a>
			</div>
		</div>
	</div>
</body>
</html>
