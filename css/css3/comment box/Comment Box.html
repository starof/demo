<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en">
<head>
	<meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
	<title>Document</title>
	<style>
	p{margin:0;}
	a{text-decoration:none;}
		.wrap{width:640px;height:350px;margin:0 auto;box-shadow: inset 0 0 172px rgba(153,153,153,.15);}
		.demo_container{display:table-cell;vertical-align:middle;width:640px;height:350px;}
		.demo{width:400px;height:140px;margin:0 auto;}
		.comment{float:left;position:relative;width:352px;height:123px;background-color:#fff;background-image:-webkit-linear-gradient(top,rgba(255,255,255,.01),rgba(0,0,0,.05));border:1px solid #c3c3c3;box-shadow:inset 0 2px 2px 0 rgba(255,255,255,.75), 0 0 5px rgba(103,103,103,.14);}
		.comment:before{position:absolute;top:20px;right:-8px;content:'◆';color:#c3c3c3;font-size:12px;text-shadow:2px 0 2px rgba(103,103,103,.14);}
		.comment:after{position:absolute;top:20px;right:-7px;content:'◆';color:#fff;font-size:12px;}
		.comment_num{float:right;width:24px;height:24px;line-height:24px;margin-top:15px;background-color:#fff;background-image:-webkit-linear-gradient(top,rgba(255,255,255,.01),rgba(0,0,0,.05));border:1px solid #c3c3c3;box-shadow:inset 0 2px 2px 0 rgba(255,255,255,.75), 0 0 5px rgba(103,103,103,.14);border-radius:5px;text-shadow:1px 0 1px rgba(255,255,255,.75);font-size:12px;text-align:center;color:#959595;font-weight:bold;}
		.comment_head{overflow:hidden;width:310px;height:25px;padding-top:15px;margin:0 auto;border-bottom:1px solid #e2e2e2;text-align:right;}
		.comment_head h1{float:left;font-size:12px;color:#464646;}
		.comment_head .close{padding:3px;background:#bbb;font-size:11px;color:#fff;}
		.comment_head .close em{font-style:normal;}
		.comment_body{width:310px;height:60px;margin:10px auto 0;}
		.comment_body img{float:left;}
		.comment_body p{margin-left:60px;line-height:1.5;font-size:12px;color:#6a6b6b;font-family:'Myriad Pro';}
		.comment_body .author{color:#0054a6;}
		.comment_body a{color:#0054a6;}
	</style>
</head>
<body>
	<div class="wrap">
		<div class="demo_container">
			<div class="demo">
				<div class="comment">
					<div class="comment_head">
						<h1><i>Comments</i></h1>
						<a href="#" class='close'><em>×</em></a>
					</div>
					<div class="comment_body">
						<img src="author.jpg" alt="" />
						<p class='author'>Blaz Robar</p>
						<p><i>‘Hey this is a really cool comment box PSD Blaz. Well Done mate....’ <a href="#">Read More</a></i></p>
					</div>
				</div>
				<span class="comment_num">2</span>
			</div>
		</div>
	</div>
</body>
</html>
