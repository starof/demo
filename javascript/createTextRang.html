<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
  <title>Document</title>
  <style>
    table{border:1px solid #ccc;}
    th,td{padding:5px;border-right:1px solid #ccc;border-bottom:1px solid #ccc;}
    textarea{width:200px;height:100px;}
  </style>
  
</head>
<body>
  <textarea name="" id="txta" ></textarea>
  <a href="#" id='btn'>click me</a>
<script>
  function $(id){
    return document.getElementById(id);
  }

  $('btn').onclick = function(){
    var len = $('txta').value.length;
    if($('txta').createTextRange){//IE浏览器
      var range = $('txta').createTextRange();              
      range.moveEnd("character",len-5);
      range.moveStart("character", 1);
      range.select();
    }else{//非IE浏览器
        $('txta').setSelectionRange(1, len-5);
        $('txta').focus();
    }
    alert($('txta').value);
  }
</script>
</body>
</html>
