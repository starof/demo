	<span id="top">&uarr;返回顶部</span>

<script type="text/javascript">
/*功能：返回顶部*/
window.onscroll = function()/*窗口滚动事件*/
{
	var oBlack = document.getElementById("top");/*获取元素*/
	if(document.documentElement.scrollTop > 0 )/*滚动条具上高度大于0，高于一屏*/
	{
		oBlack.style.display = "block";/*返回按钮显示*/
	}
	else{
		oBlack.style.display = "none";/*返回按钮隐藏*/
	}
	oBlack.onclick = function()
	{
		document.documentElement.scrollTop = 0;/*点击返回按钮，返回顶部*/
	}
}
</script>
