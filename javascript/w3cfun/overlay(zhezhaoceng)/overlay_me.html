		a{padding:5px 10px;background:#dfdfdf;border-radius:5px;border:1px solid #ccc;font-size:12px;color:#000;text-decoration:none;}
		.overlay{position:absolute;top:0;left:0;z-index:100;background:rgba(0,0,0,0.5);}

</head>

	<script type="text/javascript">
		var Oa = document.getElementsByTagName("a")[0];
		Oa.onclick = function(){
			var Ob = document.body;
			//一开始想把overlay直接加在body上，虽然出现了遮罩层，但是button始终在遮罩层的上面，不管遮罩层的z-index有多大都不管用
			var sw = document.documentElement.clientWidth;
			var sh = document.documentElement.clientHeight;
			console.log(sw,sh);
			var Odiv = document.createElement("div");
			Odiv.className = "overlay";
			Ob.insertBefore(Odiv,Oa);
			//这样写就是为了出滚动条的时候，也有遮罩层，否则就是空白
			Odiv.style.width = Math.max(document.documentElement.scrollWidth,sw) + "px";
			Odiv.style.height = Math.max(document.documentElement.scrollHeight,sh) + "px";
			window.onresize = function(){
				var sw = document.documentElement.clientWidth;
				var sh = document.documentElement.clientHeight;
				//一开始把sw和sh赋值后，去布局里面看发现都是0，那是因为没有加“px”
				Odiv.style.width = sw + "px";
				Odiv.style.height = sh + "px";
			}
		}
	</script>
</body>
